name = "osee-prep-hub-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
WEBAPP_URL = "http://localhost:8787"

# R2 bindings — set up via Cloudflare dashboard or wrangler r2 bucket create
[[r2_buckets]]
binding = "R2_VIDEOS"
bucket_name = "osee-videos"

[[r2_buckets]]
binding = "R2_AUDIO"
bucket_name = "osee-audio"

# Cron triggers: webhook processing + class reminders.
# Originally configured as [triggers] crons = ["*/1 * * * *"], but the
# Cloudflare API rejected deploys of the schedule endpoint (403 from
# /schedules). The cron can be re-added via the Cloudflare dashboard
# (Workers → osee-prep-hub-worker → Triggers → Cron Triggers) without
# redeploying the worker. See docs/DEPLOYMENT.md for instructions.

# Secrets (set via `wrangler secret put <NAME>`):
# SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_KEY
# JWT_SECRET, OPENAI_API_KEY
# EDUBOT_API_URL, EDUBOT_INTERNAL_SECRET
# WEBHOOK_SECRET_IBT, WEBHOOK_SECRET_ITP, WEBHOOK_SECRET_IELTS,
# WEBHOOK_SECRET_TOEIC, WEBHOOK_SECRET_BOOKING, WEBHOOK_SECRET_EDUBOT
# R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
# TRIPAY_API_KEY, TRIPAY_PRIVATE_KEY, TRIPAY_MERCHANT_CODE
# TELEGRAM_BOT_TOKEN, TELEGRAM_CHANNEL_ID
# OSEE_BOOKING_API_URL, OSEE_BOOKING_API_SECRET
# PASSPORT_SIGNING_KEY, PASSPORT_KEY_ID   — for OSEE Passport (Ed25519)
# LIVEKIT_API_KEY, LIVEKIT_API_SECRET, LIVEKIT_URL — for live classes
# SENTRY_DSN   — for error tracking
# OSEE_VALUATION_IDR  — for ambassador equity implied value
# RESEND_API_KEY, MAIL_FROM (transactional email)
