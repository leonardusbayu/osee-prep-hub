name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  # CI must pass before deploy (via branch protection / required checks).
  # This job also gates on CI explicitly to be safe.
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI
        run: |
          echo "Ensure the 'CI' workflow on this commit has completed successfully."
          echo "Branch protection should require: worker-test, admin-typecheck, admin-build, flutter-test, flutter-build-web, schema-verify."

  worker-deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy Worker
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  flutter-deploy:
    name: Deploy Flutter to Pages
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: flutter
      - run: flutter build web --release
        working-directory: flutter
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: osee-prep-hub
          directory: flutter/build/web
          gitHubDeclarations: ${{ github.repository }}

  admin-deploy:
    name: Deploy Admin to Pages
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:admin
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: osee-prep-hub-admin
          directory: frontend-admin/dist