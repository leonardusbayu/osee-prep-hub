name: Deploy Staging

# Cloudflare Pages auto-deploys branch pushes to staging URLs when the
# Pages project is connected to this repo. This workflow handles the
# Worker staging deploy (which has no auto-deploy).
#
# For Pages staging: nothing to do here — branches are deployed by
# Cloudflare Pages automatically with branch-name subdomain.

on:
  push:
    branches: [magazine-ui]

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI
        run: |
          echo "Ensure the 'CI' workflow on magazine-ui has completed successfully."

  worker-deploy-staging:
    name: Deploy Worker to staging
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Deploy Worker to staging environment
        working-directory: worker
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true # staging env may not be configured yet — allow to fail without blocking