name: osee_prep_hub
description: "OSEE Prep Hub — AI Teaching Assistant for English teachers in Indonesia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — Riverpod (Flutter equivalent of Zustand)
  flutter_riverpod: ^2.5.1

  # Routing with auth guards
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.5.0

  # Typography
  google_fonts: ^6.2.1
  dio_web_adapter: ^2.2.0
  web: ^1.1.1
  # Task 2 (Wave 1): Real-time collaboration
  # Note: y_supabase / y_crdt are JS-only; Flutter uses supabase_flutter's realtime.
  supabase_flutter: ^2.0.0

  # Task 4 (Wave 1): i18n
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.2.0

  # Task 5 (Wave 1): Native mobile + offline
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  connectivity_plus: ^5.0.0
  path_provider: ^2.1.0

  # Task 7 (Wave 1): Observability (Sentry Flutter)
  sentry_flutter: ^8.0.0

  # main branch: voo_kanban, url_launcher, file_picker (friend's additions)
  voo_kanban: ^0.0.3
  url_launcher: ^6.3.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  voo_responsive:
    path: vendor/voo_responsive

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/student/
