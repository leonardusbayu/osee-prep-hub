name: osee_prep_hub
description: "OSEE Prep Hub — AI Teaching Assistant for English teachers in Indonesia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — Riverpod (Flutter equivalent of Zustand)
  flutter_riverpod: ^2.5.1

  # Routing with auth guards
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.5.0

  # Typography
  google_fonts: ^6.2.1
  dio_web_adapter: ^2.2.0
  web: ^1.1.1
  voo_kanban: ^0.0.3
  url_launcher: ^6.3.2
  intl: ^0.20.2
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  voo_responsive:
    path: vendor/voo_responsive

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/student/
