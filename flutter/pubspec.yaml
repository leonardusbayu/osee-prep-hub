name: osee_prep_hub
description: "OSEE Prep Hub — AI Teaching Assistant for English teachers in Indonesia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — Riverpod (Flutter equivalent of Zustand)
  flutter_riverpod: ^2.5.1

  # Routing with auth guards
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.5.0

  # Model codegen
  json_annotation: ^4.9.0

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Model codegen
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/